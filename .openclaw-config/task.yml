# OpenClaw Task Configuration
# AI 资讯速览 - 每日自动生成任务

name: ai-digest
version: 2.0.0
description: |
  每日 AI 资讯自动生成任务
  AI Agent 会自主完成信源采集、评分筛选、文章生成、质量检查和发布

# 任务类型
type: autonomous-agent

# 使用的 AI 模型
model: claude-opus-4-6  # 或 claude-sonnet-4-6（更快更便宜）

# 任务目标（AI 会读取这个）
objective: |
  生成今天（{{date}}）的 AI 资讯简报，包括：
  - 3 篇深度文章（每篇 3-5 段，2-5 个来源）
  - 5 条快讯（每条 1 句话 + 1 个来源）

  严格遵循以下原则：
  1. 仅使用英文一手信源，不使用中文媒体或翻译内容
  2. 事实陈述，不添加主观评论或情绪化表达
  3. 所有信息必须有可追溯的来源链接
  4. 禁止使用营销词汇（震撼、颠覆、革命性等）
  5. 平等对待所有公司和产品

# 必读文档（AI 在开始任务前必须读取）
required_reading:
  - path: .openclaw-config/METHODOLOGY.md
    description: 方法论 - 评分算法和选择标准

  - path: .openclaw-config/WRITING_GUIDE.md
    description: 写作规范 - 标题、正文、格式要求

  - path: .openclaw-config/QUALITY_STANDARDS.md
    description: 质量标准 - 检查规则和评分标准

  - path: .openclaw-config/templates/article-template.md
    description: 文章模板 - Markdown 格式和 HTML 结构

# 参考文件（AI 可以按需查阅）
references:
  - path: .openclaw-config/reference/sources-list.txt
    description: 20+ 英文信源列表（官方博客、技术媒体、社区）

  - path: .openclaw-config/reference/banned-words.txt
    description: 禁用词汇列表（营销词汇、夸张表述）

  - path: .openclaw-config/data-schemas/
    description: 数据结构定义（JSON Schema）

  - path: .openclaw-config/data-examples/
    description: 数据示例（参考格式）

# 工作目录
working_directory: /Users/gary/git/blog-ai

# 输出目录
output:
  articles: content/posts/
  data: data/
  logs: logs/

# 环境变量
env:
  DATE: "{{date}}"  # 格式: YYYY-MM-DD

# AI 可用的工具
tools:
  - WebFetch      # 采集网页内容
  - WebSearch     # 搜索（备用）
  - Read          # 读取文件
  - Write         # 写入文件
  - Edit          # 编辑文件
  - Grep          # 搜索文件内容
  - Glob          # 查找文件
  - Bash          # 执行命令（Git 操作）

# 工作流步骤（AI 自主决策，这里只是建议）
suggested_workflow:

  1_collect_sources:
    description: 采集信源
    guidance: |
      - 读取 reference/sources-list.txt 获取信源列表
      - 使用 WebFetch 工具采集每个信源的最新内容
      - 提取：标题、摘要、URL、发布时间、作者
      - 保存到 data/sources_raw.json
      - 参考格式：data-examples/sources_raw.example.json

    expected_output: data/sources_raw.json
    quality_check:
      - 至少采集到 50 篇文章
      - 所有文章都有标题和 URL
      - 发布时间在最近 48 小时内

  2_score_articles:
    description: 评分和排序
    guidance: |
      - 读取 METHODOLOGY.md 了解评分算法
      - 对每篇文章进行 4 维度评分：
        1. 多源交叉验证 (40%): 检查是否有多个信源报道同一事件
        2. 社区参与度 (25%): HN/Reddit 的评论和投票数
        3. 来源权威性 (20%): 官方博客 > 技术媒体 > 社区讨论
        4. 时效性 (15%): 24 小时内递减
      - 计算总分 (0-100)
      - 按评分排序
      - 保存到 data/scored_sources.json

    expected_output: data/scored_sources.json
    quality_check:
      - 所有文章都有评分
      - 评分范围 0-100
      - 按评分降序排列

  3_select_topics:
    description: 选择主题
    guidance: |
      - 深度文章选择标准：
        * 评分 >= 70
        * 至少 2 个来源
        * 确保主题多样性（不同类别）
        * 优先选择有多个角度报道的事件
      - 快讯选择标准：
        * 评分 >= 50
        * 不与深度文章重复
        * 涵盖不同领域
      - 保存到 data/selected_topics.json
      - 参考格式：data-examples/selected_topics.example.json

    expected_output: data/selected_topics.json
    quality_check:
      - 选中 3 篇深度文章
      - 选中 5 条快讯
      - 每篇深度文章至少 2 个来源
      - 主题不重复

  4_generate_article:
    description: 生成文章
    guidance: |
      - 读取 WRITING_GUIDE.md 了解写作规范
      - 读取 templates/article-template.md 了解格式
      - 使用 Claude API 生成文章，遵循以下规范：

        标题要求：
        - 陈述句，15-35 字
        - 直接说明事件，不使用疑问句或感叹句
        - 不使用营销词汇

        正文要求：
        - 每篇深度文章 3-5 段
        - 每段 2-4 句话
        - 事实陈述，不添加评论
        - 逻辑清晰：背景 → 事件 → 影响

        关键要点：
        - 2-4 条，每条 15-30 字
        - 提炼核心洞察
        - 使用 <span class="key-tag"> 包裹

        来源链接：
        - 2-5 个一手信源
        - 使用 <div class="sources-list"> 结构
        - 包含标题和域名

        快讯格式：
        - 1 句话概括，30-80 字
        - 加粗标题
        - 使用 <div class="quick-news-item"> 结构

      - 保存到 content/posts/{{date}}-ai-digest.md

    expected_output: content/posts/{{date}}-ai-digest.md
    quality_check:
      - Front Matter 完整（title, date, description）
      - 3 个 article-section
      - 1 个 quick-news-section（5 条）
      - 所有链接格式正确
      - 文件大小 15-25KB

  5_quality_check:
    description: 质量检查
    guidance: |
      - 读取 QUALITY_STANDARDS.md 了解检查规则
      - 执行以下检查：

        1. 禁用词汇检查（FAIL）：
           - 读取 reference/banned-words.txt
           - 检查文章中是否包含禁用词汇
           - 如果发现，标记为 FAIL

        2. HTML 结构检查（FAIL）：
           - 检查 article-section 数量 = 3
           - 检查 quick-news-item 数量 = 5
           - 检查 sources-list 存在
           - 检查 key-tags 存在

        3. 链接有效性检查（WARN）：
           - 检查所有链接格式正确
           - 检查链接可访问（可选）

        4. 来源数量检查（FAIL）：
           - 每篇深度文章至少 2 个来源
           - 每条快讯至少 1 个来源

        5. 文章数量检查（FAIL）：
           - 深度文章 = 3 篇
           - 快讯 = 5 条

        6. 重复内容检查（WARN）：
           - 检查标题是否重复
           - 检查内容是否过于相似

      - 计算总分 (0-100)
      - 保存报告到 data/quality_report.json
      - 如果评分 < 80，建议重新生成

    expected_output: data/quality_report.json
    quality_check:
      - 总分 >= 85
      - 所有 FAIL 级别检查通过
      - WARN 级别检查 <= 1 个

  6_git_commit:
    description: 提交到 Git
    guidance: |
      - 使用 Bash 工具执行 Git 命令
      - git add content/posts/{{date}}-ai-digest.md
      - git add data/quality_report.json
      - git commit -m "Add: AI资讯简报 {{date}}"
      - 如果需要，git push origin main

    quality_check:
      - Git 提交成功
      - 文件已添加到仓库

# 质量标准（AI 必须达到）
quality_requirements:
  min_score: 85          # 最低质量评分
  max_retries: 2         # 最大重试次数
  fail_on_banned_words: true   # 发现禁用词汇立即失败
  fail_on_structure: true      # HTML 结构错误立即失败

# 错误处理
error_handling:
  on_collection_failure:
    - 记录失败的信源
    - 继续处理其他信源
    - 如果成功率 < 50%，任务失败

  on_scoring_failure:
    - 使用默认评分算法
    - 记录警告

  on_generation_failure:
    - 重试最多 2 次
    - 如果仍失败，任务失败

  on_quality_check_failure:
    - 如果评分 < 85，重新生成文章
    - 如果重试 2 次仍失败，任务失败

# 日志配置
logging:
  level: INFO
  file: logs/ai-digest-{{date}}.log
  format: "[{{timestamp}}] [{{level}}] {{message}}"

# 通知（可选）
notifications:
  on_success:
    - type: log
      message: "✅ AI 资讯简报生成成功: {{date}}"

  on_failure:
    - type: log
      message: "❌ AI 资讯简报生成失败: {{error}}"

# 执行时间限制
timeout: 7200  # 2 小时（秒）

# 并发控制
concurrency:
  max_parallel_fetches: 10  # 最多同时采集 10 个信源
  rate_limit: 100/minute    # 每分钟最多 100 个请求

# 缓存配置
cache:
  enabled: true
  ttl: 3600  # 1 小时
  directory: .cache/

# 元数据
metadata:
  author: Gary Yao
  repository: https://github.com/gaarry/blog-ai
  reference: https://ai-digest.liziran.com/zh/
  version: 2.0.0
  last_updated: 2026-03-03
