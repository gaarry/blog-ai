<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ block "title" . }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Description }}{{ end }}">
  <meta name="author" content="{{ .Site.Params.author }}">
  <link rel="canonical" href="{{ .Permalink }}">
  
  <!-- Open Graph -->
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">
  
  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ .Title }}">
  <meta name="twitter:description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Description }}{{ end }}">
  {{ with .Site.Params.twitter }}
  <meta name="twitter:site" content="@{{ . }}">
  {{ end }}
  
  <!-- RSS -->
  {{ with .OutputFormats.Get "RSS" }}
  <link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }}" href="{{ .Permalink }}">
  {{ end }}
  
  <!-- CSS -->
  <link rel="stylesheet" href="/css/main.css">
  
  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico">
  
  {{ block "styles" . }}{{ end }}
</head>
<body>
  <div class="container">
    {{ partial "header.html" . }}
    {{ block "main" . }}{{ end }}
  </div>

  {{ partial "footer.html" . }}
  
  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="Enlarged photo">
    </div>
  </div>
  
  <script>
    // 文章卡片点击跳转
    document.addEventListener('DOMContentLoaded', function() {
      const articleCards = document.querySelectorAll('.article-card[data-href]');

      articleCards.forEach(function(card) {
        card.addEventListener('click', function(e) {
          // 如果点击的是链接，让链接自己处理
          if (e.target.tagName === 'A' || e.target.closest('a')) {
            return;
          }

          const href = this.getAttribute('data-href');
          if (href) {
            window.location.href = href;
          }
        });
      });
    });

    // 平滑滚动
    document.querySelectorAll('a[href^="#"]').forEach(function(anchor) {
      anchor.addEventListener('click', function(e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({
            behavior: 'smooth'
          });
        }
      });
    });

    // 复制链接功能
    const copyBtn = document.querySelector('.share-copy');
    if (copyBtn) {
      copyBtn.addEventListener('click', function() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(function() {
          copyBtn.classList.add('copied');
          const originalText = copyBtn.innerHTML;
          copyBtn.innerHTML = copyBtn.innerHTML.replace('复制链接', '已复制');
          setTimeout(function() {
            copyBtn.classList.remove('copied');
            copyBtn.innerHTML = originalText;
          }, 2000);
        }).catch(function(err) {
          console.error('Failed to copy:', err);
        });
      });
    }
  </script>
</body>
</html>
